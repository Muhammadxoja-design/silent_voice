{% extends 'base.html' %}
{% block content %}
<section class="card narrow">
  <h1>Profile settings</h1>
  <form method="post" class="form-grid">
    <input name="name" value="{{ current_user.name }}" required>
    <select name="language">
      <option value="UZB" {% if current_user.language == 'UZB' %}selected{% endif %}>UZB</option>
      <option value="ENG" {% if current_user.language == 'ENG' %}selected{% endif %}>ENG</option>
      <option value="RUS" {% if current_user.language == 'RUS' %}selected{% endif %}>RUS</option>
    </select>
    <input name="password" type="password" placeholder="New password (optional)">
    <button class="btn btn-primary">Save changes</button>
  </form>
</section>
{% endblock %}
